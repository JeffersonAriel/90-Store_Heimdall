services:

  # ─── PHP-FPM ─────────────────────────────────────────────────────────────────
  app:
    build:
      context: ./docker/php
      dockerfile: Dockerfile
    container_name: heimdall_app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - .:/var/www
      - ./docker/php/php.ini:/usr/local/etc/php/conf.d/local.ini
    networks:
      - heimdall
    depends_on:
      - mysql
      - redis

  # ─── Nginx ───────────────────────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: heimdall_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - .:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
      - ./docker/nginx/ssl:/etc/nginx/ssl
    networks:
      - heimdall
    depends_on:
      - app

  # ─── MySQL 8 ─────────────────────────────────────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: heimdall_mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-heimdall}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-secret}
      MYSQL_PASSWORD: ${DB_PASSWORD:-secret}
      MYSQL_USER: ${DB_USERNAME:-heimdall}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/my.cnf:/etc/mysql/conf.d/my.cnf
    networks:
      - heimdall

  # ─── Redis ───────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: heimdall_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - heimdall

  # ─── Mailpit (dev email) ─────────────────────────────────────────────────────
  mailpit:
    image: axllent/mailpit:latest
    container_name: heimdall_mailpit
    restart: unless-stopped
    ports:
      - "1025:1025"
      - "8025:8025"
    networks:
      - heimdall

  # ─── Queue Worker ────────────────────────────────────────────────────────────
  queue:
    build:
      context: ./docker/php
      dockerfile: Dockerfile
    container_name: heimdall_queue
    restart: unless-stopped
    working_dir: /var/www
    command: php artisan queue:work --sleep=3 --tries=3 --max-time=3600
    volumes:
      - .:/var/www
    networks:
      - heimdall
    depends_on:
      - mysql
      - redis

  # ─── Scheduler ───────────────────────────────────────────────────────────────
  scheduler:
    build:
      context: ./docker/php
      dockerfile: Dockerfile
    container_name: heimdall_scheduler
    restart: unless-stopped
    working_dir: /var/www
    command: bash -c "while true; do php artisan schedule:run --no-interaction >> /dev/null 2>&1; sleep 60; done"
    volumes:
      - .:/var/www
    networks:
      - heimdall
    depends_on:
      - mysql
      - redis

networks:
  heimdall:
    driver: bridge

volumes:
  mysql_data:
  redis_data:
